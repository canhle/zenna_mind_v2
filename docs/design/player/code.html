<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meditation Player</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #bfe4d8;
    --bg-circle: rgba(255,255,255,0.18);
    --text-main: #0a3d28;
    --text-muted: rgba(10,60,45,0.48);
    --text-hint:  rgba(10,60,45,0.38);
    --btn-icon-bg: rgba(255,255,255,0.42);
    --btn-icon-border: transparent;
    --skip-border: rgba(10,100,70,0.28);
    --skip-icon:  rgba(10,80,55,0.52);
    --play-bg:   #0d6e4a;
    --play-icon: #ffffff;
    --prog-track: rgba(10,100,70,0.15);
    --prog-fill:  rgba(10,120,80,0.62);
    --prog-dot:  #0d8a5e;
    --ring-outer: rgba(10,100,70,0.2);
    --ring-mid:   rgba(10,100,70,0.12);
    --ring-core:  rgba(255,255,255,0.46);
    --ring-dot:   rgba(10,120,80,0.36);
  }

  body {
    min-height: 100vh;
    background: #e8f5f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  .phone {
    width: 320px;
    height: 600px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.07);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .bg-blob {
    position: absolute;
    border-radius: 50%;
    background: var(--bg-circle);
    pointer-events: none;
  }
  .blob-1 { width: 300px; height: 300px; top: -100px; left: -80px; }
  .blob-2 { width: 200px; height: 200px; bottom: -60px; right: -55px; }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 0 30px;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0 0;
  }
  .status-time {
    font-size: 12px;
    color: var(--text-hint);
    letter-spacing: 0.03em;
  }
  .status-icons { display: flex; gap: 12px; align-items: center; }

  /* Top nav */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0 0;
  }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--btn-icon-bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.6); }
  .top-label {
    font-size: 11px;
    color: var(--text-hint);
    letter-spacing: 0.1em;
  }

  /* Hero */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0;
  }

  .breath-ring {
    position: relative;
    width: 136px; height: 136px;
    margin-bottom: 28px;
  }
  .br-outer {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--ring-outer);
    animation: pulse 4s ease-in-out infinite;
  }
  .br-mid {
    position: absolute; inset: 16px;
    border-radius: 50%;
    border: 1px solid var(--ring-mid);
    animation: pulse 4s ease-in-out infinite 0.5s;
  }
  .br-core {
    position: absolute; inset: 32px;
    border-radius: 50%;
    background: var(--ring-core);
    display: flex; align-items: center; justify-content: center;
    animation: pulse 4s ease-in-out infinite 1s;
  }
  .br-dot {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--ring-dot);
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.04); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.15); }
  }

  .session-name {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text-main);
    line-height: 1.35;
    margin-bottom: 10px;
  }
  .session-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.65;
    max-width: 200px;
  }

  /* Progress */
  .progress-area { padding: 0 0 16px; }
  .prog-times {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .prog-t { font-size: 11px; color: var(--text-hint); }
  .prog-track {
    height: 3px;
    background: var(--prog-track);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }
  .prog-fill {
    height: 3px;
    width: 38%;
    background: var(--prog-fill);
    border-radius: 2px;
  }
  .prog-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--prog-dot);
    position: absolute;
    top: -4px; left: 38%;
    transform: translateX(-50%);
    transition: transform 0.1s;
  }
  .prog-track:hover .prog-dot { transform: translateX(-50%) scale(1.3); }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 4px 0 30px;
  }

  .ctrl-skip {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--skip-border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .ctrl-skip:hover {
    background: rgba(255,255,255,0.3);
    border-color: rgba(10,100,70,0.45);
  }
  .ctrl-skip:active { transform: scale(0.95); }

  .ctrl-play {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: var(--play-bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(13,110,74,0.3);
  }
  .ctrl-play:hover { background: #0a5c3d; }
  .ctrl-play:active { transform: scale(0.95); }
</style>
</head>
<body>
<div class="phone">
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="content">

    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 10c1.5-5 10-5 12 0" stroke="rgba(10,60,45,0.4)" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="7" cy="12" r="1" fill="rgba(10,60,45,0.4)"/>
        </svg>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="4" width="9" height="7" rx="1.5" stroke="rgba(10,60,45,0.4)" stroke-width="1.2"/>
          <path d="M10 6h2a1 1 0 010 2h-2" stroke="rgba(10,60,45,0.4)" stroke-width="1.2"/>
        </svg>
      </div>
    </div>

    <div class="top-bar">
      <div class="icon-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L4 7l5 5" stroke="rgba(10,60,45,0.65)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="top-label">ĐANG PHÁT</span>
      <div class="icon-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="3"  r="1" fill="rgba(10,60,45,0.5)"/>
          <circle cx="7" cy="7"  r="1" fill="rgba(10,60,45,0.5)"/>
          <circle cx="7" cy="11" r="1" fill="rgba(10,60,45,0.5)"/>
        </svg>
      </div>
    </div>

    <div class="hero">
      <div class="breath-ring">
        <div class="br-outer"></div>
        <div class="br-mid"></div>
        <div class="br-core"><div class="br-dot"></div></div>
      </div>
      <div class="session-name">10 phút xoa dịu<br>căng thẳng</div>
      <div class="session-sub">Lắng nghe hơi thở, giải phóng áp lực</div>
    </div>

    <div class="progress-area">
      <div class="prog-times">
        <span class="prog-t">3:48</span>
        <span class="prog-t">-6:12</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill"></div>
        <div class="prog-dot"></div>
      </div>
    </div>

    <div class="controls">
      <div class="ctrl-skip">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L4 8l6 5V3z" fill="rgba(10,80,55,0.52)"/>
          <line x1="3" y1="3" x2="3" y2="13" stroke="rgba(10,80,55,0.52)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="ctrl-play" id="playBtn">
        <svg id="pauseIcon" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="6"  y="5" width="3.5" height="14" rx="1.75" fill="white"/>
          <rect x="14.5" y="5" width="3.5" height="14" rx="1.75" fill="white"/>
        </svg>
        <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" style="display:none; margin-left:3px;">
          <path d="M7 4l14 8-14 8V4z" fill="white"/>
        </svg>
      </div>
      <div class="ctrl-skip">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 3l6 5-6 5V3z" fill="rgba(10,80,55,0.52)"/>
          <line x1="13" y1="3" x2="13" y2="13" stroke="rgba(10,80,55,0.52)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

  </div>
</div>

<script>
  const btn = document.getElementById('playBtn');
  const pauseIcon = document.getElementById('pauseIcon');
  const playIcon  = document.getElementById('playIcon');
  let playing = true;

  btn.addEventListener('click', () => {
    playing = !playing;
    pauseIcon.style.display = playing ? 'block' : 'none';
    playIcon.style.display  = playing ? 'none'  : 'block';
  });
</script>
</body>
</html>
