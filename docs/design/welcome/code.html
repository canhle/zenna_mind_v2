<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thiền - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;family=Manrope:wght@200;300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#0D9488", // Teal 600
              "primary-dim": "#0F766E", // Teal 700
              "primary-container": "#CCFBF1", // Teal 100
              "on-primary": "#FFFFFF",
              "on-primary-container": "#134E4A", // Teal 900
              "secondary": "#2DD4BF", // Teal 400
              "on-secondary": "#134E4A",
              "surface": "#F0FDFA", // Teal 50
              "background": "#F0FDFA",
              "on-surface": "#0F172A", // Slate 900
              "on-surface-variant": "#475569", // Slate 600
              "outline": "#94A3B8", // Slate 400
              "surface-container-lowest": "#FFFFFF",
              "surface-container-low": "#F8FAFC",
              "surface-container": "#F1F5F9",
              "surface-container-high": "#E2E8F0",
              "surface-container-highest": "#CBD5E1",
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .font-plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: max(884px, 100dvh);
            background: radial-gradient(circle at top left, #F0FDFA 0%, #E0F2F1 50%, #F0FDFA 100%);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-between overflow-x-hidden selection:bg-primary-container">
<!-- Hero Illustration Section -->
<header class="relative w-full h-[486px] flex items-center justify-center overflow-hidden">
<!-- Abstract Atmospheric Background -->
<div class="absolute inset-0 bg-gradient-to-b from-primary/10 to-transparent z-0"></div>
<!-- Illustration Container -->
<div class="relative z-10 w-full max-w-lg aspect-square flex items-center justify-center">
<!-- Glassmorphism Orbs for Depth -->
<div class="absolute w-64 h-64 bg-primary/20 rounded-full blur-3xl -top-10 -left-10 animate-pulse"></div>
<div class="absolute w-48 h-48 bg-secondary/20 rounded-full blur-3xl -bottom-10 -right-10"></div>
<!-- Main Abstract Visual -->
<div class="relative w-72 h-72 md:w-96 md:h-96 rounded-full overflow-hidden shadow-[0_20px_60px_rgba(13,148,136,0.15)] bg-white/40 backdrop-blur-md border border-white/50 p-2">
<img alt="Zen scene" class="w-full h-full object-cover rounded-full" data-alt="Soft abstract landscape with a stylized person meditating at sunrise, calm teal and soft mint tones, ethereal glowing atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXvtye7VpeTGi8t39lIeigAYeh2gDFUjkMO413G5qbgZF88pwOmPRwUAGsFkOm_KG3xsK-KJp5UT4WhBykml7MZthWixz6cjgvL6aXjOPlzjkceu2_wNbtxp78tL2iZn9FIYL1x3Pw8caZ9BHIQlfKYxmtkofDeKU339fKyiZW0_YR-GQVfLxqvrzT2DoU0sbUgS4ZRhtGud3uKQt1OLiM7IH0D455cuIMq4627XfV9oCVxWvNGvYFqzSCh13ygvBwf91ESNKwd8E"/>
</div>
<!-- Decorative Floating Elements -->
<div class="absolute top-1/4 right-4 bg-white/70 backdrop-blur-xl p-4 rounded-2xl shadow-[0_10px_30px_rgba(13,148,136,0.1)] border border-white/60 flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="spa">spa</span>
<span class="text-xs font-label tracking-widest uppercase text-primary-dim font-bold">Bình an</span>
</div>
</div>
</header>
<!-- Content Canvas -->
<main class="w-full max-w-2xl px-8 flex flex-col items-center text-center flex-grow -mt-12 relative z-20">
<div class="space-y-6">
<!-- Title -->
<h1 class="font-plus-jakarta text-3xl md:text-5xl font-extrabold text-on-surface leading-tight tracking-[0.05rem]">
                Chào mừng bạn đến với <span class="text-primary block">Ứng dụng Thiền</span>
</h1>
<!-- Description -->
<p class="font-body text-on-surface-variant text-lg md:text-xl font-light max-w-md mx-auto leading-relaxed">
                Hãy bắt đầu hành trình bình an của bạn và tìm lại sự cân bằng trong tâm hồn.
            </p>
</div>
<!-- Action Section -->
<div class="mt-12 w-full max-w-xs">
<button class="w-full py-5 px-10 rounded-2xl bg-gradient-to-r from-primary-dim to-primary text-on-primary font-plus-jakarta font-bold text-lg tracking-wider shadow-[0_15px_35px_rgba(13,148,136,0.3)] hover:shadow-[0_20px_40px_rgba(13,148,136,0.4)] transition-all transform active:scale-95 duration-200">
                Bắt đầu
            </button>
<p class="mt-6 font-body text-xs text-outline font-medium tracking-wide">
                Hơn 1 triệu người đang luyện tập mỗi ngày
            </p>
</div>
</main>
<!-- Shared Footer Component -->
<footer class="flex flex-col items-center gap-2 w-full mt-auto mb-8 py-8 bg-transparent">
<div class="flex gap-6">
<a class="font-manrope text-xs font-medium tracking-wide text-primary/60 hover:text-primary transition-colors" href="#">
                Chính sách bảo mật
            </a>
<a class="font-manrope text-xs font-medium tracking-wide text-primary/60 hover:text-primary transition-colors" href="#">
                Điều khoản sử dụng
            </a>
</div>
<p class="font-manrope text-xs font-light tracking-wide text-outline/70">
            © 2024 Thiền Sanctuary
        </p>
</footer>
<!-- Ambient Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.05] z-[100] bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')]"></div>
</body></html>
